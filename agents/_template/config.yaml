agent:
  name: "template"
  display_name: "Template Harness"
  description: "Starter config — copy and customize"
  version: "0.1.0"

# Budgets, limits, and per-stage defaults. The model for each stage is
# supplied at invocation via --model / --searcher-model / --extractor-model.
budget:
  max_searches: 5
  scratchpad_max_tokens: 512
  results_per_query: 5

searcher:
  temperature: 0.2
  thinking_budget: null
  thinking_instruction: true
  thinking_passthrough: true
  force_tools: false
  max_nudges: 5
  max_shrink_attempts: 2

extractor:
  temperature: 0.0
  max_tokens: 1024

verbose: false
