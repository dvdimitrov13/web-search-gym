agent:
  name: "lean_searcher"
  display_name: "Lean Searcher"
  description: "Exa search loop + short-answer extractor. BrowseComp-shaped output."
  version: "0.1.0"

budget:
  max_searches: 5
  scratchpad_max_tokens: 1024
  results_per_query: 5

searcher:
  # Defaults; individual fields can also live on the model config.
  temperature: 0.2
  thinking_budget: null
  # thinking_instruction is the "think concisely" hint for non-extended-thinking
  # mode; leave OFF when the model is using extended thinking (thinking_budget>0).
  thinking_instruction: false
  thinking_passthrough: false
  force_tools: false
  # Ablation: set false to drop the scratchpad tool entirely (v3b).
  use_scratchpad: true
  # Exa retrieval backend: null → auto (default). "instant" / "fast" /
  # "neural" / "keyword" pin a specific tier. `deep*` tiers go via exa_deep,
  # not here.
  exa_search_type: instant
  max_nudges: 5
  max_shrink_attempts: 2

extractor:
  temperature: 0.0
  max_tokens: 1024

verbose: true
