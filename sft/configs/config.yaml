# Local dev defaults (small Qwen3 for smoke tests on CPU/MPS).
# For cloud training on H100/A6000, copy to config_cloud.yaml and bump:
#   model.name: "Qwen/Qwen3-8B" or "Qwen/Qwen3-14B"
#   lora.rank: 16–32, alpha: 32–64
#   training.batch_size: 2–4
#   training.max_seq_length: 16384
#   training.gradient_checkpointing: true
#   training.bf16: true

model:
  name: "Qwen/Qwen3-0.6B"

lora:
  rank: 8
  alpha: 32
  dropout: 0.1
  target_modules: "all-linear"

training:
  output_dir: "sft/checkpoints"
  save_dir: "sft/output"
  epochs: 1
  batch_size: 1
  gradient_accumulation: 4
  learning_rate: 2.0e-5
  lr_scheduler: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_seq_length: 2048
  logging_steps: 1
  save_strategy: "steps"
  save_steps: 30
  bf16: true
  gradient_checkpointing: true
